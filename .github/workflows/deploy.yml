# Build + deploy to GitHub Pages on every push to main.
# Replaces the old force-push-to-gh-pages recipe, which could wedge the Pages
# pipeline when two pushes raced (a mid-deploy cancellation leaves a phantom
# "in progress" deployment; everything after queues until timeout).
# cancel-in-progress stays FALSE so deploys serialize instead of cancelling.
name: deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
