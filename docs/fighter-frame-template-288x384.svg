  <text x="24" y="34" font-family="monospace" font-size="14" font-weight="700" fill="#ffffff">FIGHTER FRAME GUIDE</text>
  <text x="24" y="56" font-family="monospace" font-size="11" fill="#d8e7ff">cell: 288x384</text>
  <text x="24" y="74" font-family="monospace" font-size="11" fill="#ffffff">white y=365: soles/contact line</text>
  <text x="24" y="92" font-family="monospace" font-size="11" fill="#ffd166">yellow y=352: ankle/contact band top</text>
  <text x="24" y="110" font-family="monospace" font-size="11" fill="#ff8a5c">orange y=374: contact band bottom</text>

  <text x="16" y="345" font-family="monospace" font-size="11" fill="#ffd166">feet should live in this band</text>
  <text x="16" y="363" font-family="monospace" font-size="11" fill="#ffffff">lowest sole pixels touch y=365</text>
  <text x="16" y="382" font-family="monospace" font-size="10" fill="#ffb0a0">keep transparent padding below; do not crop into soles</text>

  <text x="151" y="202" font-family="monospace" font-size="10" fill="#58e6d9" transform="rotate(90 151 202)">center x=144</text>
