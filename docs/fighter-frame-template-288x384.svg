  <ellipse cx="144" cy="368" rx="98" ry="12" fill="#000000" opacity="0.28"/>
  <ellipse cx="96" cy="366" rx="28" ry="7" fill="#000000" opacity="0.38"/>
  <ellipse cx="192" cy="366" rx="28" ry="7" fill="#000000" opacity="0.38"/>

