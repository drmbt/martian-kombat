  <rect x="0" y="304" width="288" height="80" fill="#3a2b24"/>
  <rect x="0" y="350" width="288" height="34" fill="#5b362f" opacity="0.95"/>

  <line x1="144" y1="0" x2="144" y2="384" stroke="#58e6d9" stroke-width="2" stroke-dasharray="8 6"/>
  <line x1="0" y1="365" x2="288" y2="365" stroke="#ffffff" stroke-width="4"/>
