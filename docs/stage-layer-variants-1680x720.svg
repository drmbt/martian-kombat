<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="720" viewBox="0 0 1680 720">
  <rect width="1680" height="720" fill="#10131a"/>
  <text x="48" y="56" font-family="monospace" font-size="34" font-weight="700" fill="#ffffff">PARALLAX LAYER VARIANTS — 1680x720</text>
  <text x="48" y="92" font-family="monospace" font-size="22" fill="#d8e7ff">Use one of these contracts per stage. Keep floor + seam-sensitive art together in stage.png.</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff"/>
    </marker>
  </defs>

  <g transform="translate(48 130)">
    <rect x="0" y="0" width="480" height="520" fill="#171b24" stroke="#65748a" stroke-width="2"/>
    <text x="24" y="42" font-family="monospace" font-size="28" font-weight="700" fill="#ffd166">1 LAYER</text>
    <text x="24" y="76" font-family="monospace" font-size="20" fill="#fff2c2">stage.jpg / stage.png only</text>
    <rect x="40" y="108" width="400" height="360" fill="#6a4b42"/>
    <rect x="40" y="358" width="400" height="110" fill="#8f5044"/>
    <line x1="40" y1="238" x2="440" y2="238" stroke="#9cc7ff" stroke-width="3"/>
    <line x1="40" y1="358" x2="440" y2="358" stroke="#ffd166" stroke-width="3"/>
    <line x1="40" y1="415" x2="440" y2="415" stroke="#ffffff" stroke-width="5"/>
    <text x="58" y="232" font-family="monospace" font-size="16" fill="#9cc7ff">horizon y=260-310</text>
    <text x="58" y="352" font-family="monospace" font-size="16" fill="#ffd166">floor starts y=500</text>
    <text x="58" y="410" font-family="monospace" font-size="16" fill="#ffffff">feet y=613</text>
    <text x="24" y="502" font-family="monospace" font-size="19" fill="#d8e7ff">Factor: stage 1.00</text>
  </g>

  <g transform="translate(600 130)">
    <rect x="0" y="0" width="480" height="520" fill="#171b24" stroke="#65748a" stroke-width="2"/>
    <text x="24" y="42" font-family="monospace" font-size="28" font-weight="700" fill="#9cc7ff">2 LAYERS</text>
    <text x="24" y="76" font-family="monospace" font-size="20" fill="#d8e7ff">sky.png + stage.png</text>
    <rect x="40" y="108" width="400" height="150" fill="#25466c"/>
    <rect x="40" y="258" width="400" height="210" fill="#6a4b42"/>
    <rect x="40" y="358" width="400" height="110" fill="#8f5044"/>
    <line x1="40" y1="238" x2="440" y2="238" stroke="#9cc7ff" stroke-width="3"/>
    <line x1="40" y1="358" x2="440" y2="358" stroke="#ffd166" stroke-width="3"/>
    <line x1="40" y1="415" x2="440" y2="415" stroke="#ffffff" stroke-width="5"/>
    <line x1="40" y1="258" x2="440" y2="258" stroke="#9cc7ff" stroke-width="2" stroke-dasharray="10 8"/>
    <text x="58" y="150" font-family="monospace" font-size="16" fill="#d8e7ff">sky: y=0-365 fade out</text>
    <text x="58" y="334" font-family="monospace" font-size="16" fill="#fff2c2">stage: floor + mid/back seams</text>
    <text x="58" y="410" font-family="monospace" font-size="16" fill="#ffffff">feet y=613</text>
    <text x="24" y="488" font-family="monospace" font-size="18" fill="#d8e7ff">Factors: sky 0.10-0.20</text>
    <text x="24" y="512" font-family="monospace" font-size="18" fill="#d8e7ff">stage 1.00</text>
  </g>

  <g transform="translate(1152 130)">
    <rect x="0" y="0" width="480" height="520" fill="#171b24" stroke="#65748a" stroke-width="2"/>
    <text x="24" y="42" font-family="monospace" font-size="28" font-weight="700" fill="#ff8a5c">3 LAYERS</text>
    <text x="24" y="76" font-family="monospace" font-size="20" fill="#ffd8c8">sky.png + back.png + stage.png</text>
    <rect x="40" y="108" width="400" height="130" fill="#25466c"/>
    <rect x="40" y="238" width="400" height="160" fill="#5a4e6f"/>
    <rect x="40" y="338" width="400" height="130" fill="#8f5044"/>
    <line x1="40" y1="238" x2="440" y2="238" stroke="#9cc7ff" stroke-width="3"/>
    <line x1="40" y1="358" x2="440" y2="358" stroke="#ffd166" stroke-width="3"/>
    <line x1="40" y1="415" x2="440" y2="415" stroke="#ffffff" stroke-width="5"/>
    <line x1="40" y1="325" x2="440" y2="325" stroke="#ff8a5c" stroke-width="2" stroke-dasharray="10 8"/>
    <text x="58" y="150" font-family="monospace" font-size="16" fill="#d8e7ff">sky: y=0-365 fade out</text>
    <text x="58" y="282" font-family="monospace" font-size="16" fill="#ffd8c8">back: y=235-585 faded band</text>
    <text x="58" y="380" font-family="monospace" font-size="16" fill="#fff2c2">stage: y=430+ fade in</text>
    <text x="58" y="410" font-family="monospace" font-size="16" fill="#ffffff">feet y=613</text>
    <text x="24" y="464" font-family="monospace" font-size="18" fill="#d8e7ff">Factors: sky 0.10-0.20</text>
    <text x="24" y="488" font-family="monospace" font-size="18" fill="#d8e7ff">back 0.30-0.50</text>
    <text x="24" y="512" font-family="monospace" font-size="18" fill="#d8e7ff">stage 1.00</text>
  </g>

  <g opacity="0.75">
    <line x1="48" y1="680" x2="1632" y2="680" stroke="#ffffff" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
    <text x="608" y="706" font-family="monospace" font-size="22" fill="#ffffff">all layers use full 1680x720 canvas; transparency controls visibility</text>
  </g>
</svg>
