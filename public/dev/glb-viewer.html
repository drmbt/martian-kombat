<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{margin:0;display:flex;background:#223}canvas{width:50vw!important;height:100vh!important}</style></head><body>
<script type="importmap">{"imports":{"three":"/node_modules/three/build/three.module.js","three/webgpu":"/node_modules/three/build/three.webgpu.js","three/addons/":"/node_modules/three/examples/jsm/"}}</script>
<script type="module">
const url = new URLSearchParams(location.search).get('glb') ?? '/assets/3d/characters/flo/flo.glb';
async function view(kind) {
  const T = kind === 'webgpu' ? await import('three/webgpu') : await import('three');
  const { GLTFLoader } = await import('three/addons/loaders/GLTFLoader.js');
  const renderer = kind === 'webgpu' ? new T.WebGPURenderer({antialias:true}) : new T.WebGLRenderer({antialias:true});
  if (renderer.init) await renderer.init();
  renderer.setSize(innerWidth/2, innerHeight);
  document.body.appendChild(renderer.domElement);
  const scene = new T.Scene(); scene.background = new T.Color(0x334);
  const cam = new T.PerspectiveCamera(35, (innerWidth/2)/innerHeight, 0.1, 50);
  cam.position.set(0, 1.3, 4.2); cam.lookAt(0, 1.1, 0);
  scene.add(new T.DirectionalLight(0xffffff, 2.5), new T.AmbientLight(0x8899bb, 1.2));
  const gltf = await new GLTFLoader().loadAsync(url);
  if (new URLSearchParams(location.search).get('fixnormals') === '1') {
    gltf.scene.traverse(o => { if (o.isMesh) o.geometry.computeVertexNormals(); });
  }
  scene.add(gltf.scene);
  const mixer = new T.AnimationMixer(gltf.scene);
  const idle = gltf.animations.find(a => a.name === 'idle');
  if (idle) mixer.clipAction(idle).play();
  const clock = new T.Clock();
  (function loop(){ requestAnimationFrame(loop); mixer.update(clock.getDelta()); renderer.render(scene, cam); })();
  console.log('[viewer]', kind, 'up');
}
await view('webgl'); await view('webgpu');
</script></body></html>
